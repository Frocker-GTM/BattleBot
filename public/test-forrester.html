<!DOCTYPE html>
<html>
<head>
  <title>Forrester Wave Processor Test</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; }
    button { background: #1E3A5F; color: white; padding: 10px 20px; border: none; cursor: pointer; margin: 5px; }
    textarea { width: 100%; height: 200px; margin: 10px 0; }
    pre { background: #f0f0f0; padding: 15px; overflow-x: auto; white-space: pre-wrap; }
    .section { border: 1px solid #ccc; padding: 15px; margin: 15px 0; border-radius: 4px; }
    label { font-weight: bold; display: block; margin-bottom: 5px; }
    .note { background: #FFF9DB; padding: 10px; border-left: 4px solid #885500; margin: 10px 0; font-size: 14px; }
  </style>
</head>
<body>
  <h1>Forrester Wave Processor Test</h1>
  <div class="note">⚠️ Running against: <strong id="apiDisplay"></strong></div>
  <p>Session ID: <strong>test_forrester_002</strong></p>

  <div class="section">
    <h2>Step 1 — Start Extraction</h2>
    <button onclick="startExtraction()">Start Cordial Extraction</button>
  </div>

  <div class="section">
    <h2>Step 2 — Upload Score Table</h2>
    <label>Select score table screenshot (can upload multiple):</label>
    <input type="file" id="scoreTable" accept="image/*">
    <br><br>
    <button onclick="processScoreTable()">Process Score Table</button>
  </div>

  <div class="section">
    <h2>Step 3 — Upload Wave Graphic</h2>
    <label>Select Wave graphic screenshot:</label>
    <input type="file" id="waveGraphic" accept="image/*">
    <br><br>
    <button onclick="processWaveGraphic()">Process Wave Graphic</button>
  </div>

  <div class="section">
    <h2>Step 4 — Paste Vendor Profile</h2>
    <label>Paste the full Cordial vendor profile text here:</label>
    <textarea id="profileText" placeholder="Paste vendor profile here..."></textarea>
    <button onclick="processVendorProfile()">Process Vendor Profile</button>
  </div>

  <div class="section">
    <h2>PMM Review Response</h2>
    <label>Your response to the current review step:</label>
    <textarea id="pmmResponse" placeholder="Type your PMM response here..."></textarea>
    <button onclick="submitPMMReview()">Submit PMM Review</button>
  </div>

  <div class="section">
    <h2>Confidence Score</h2>
    <input type="number" id="confidenceScore" min="1" max="5" value="4" style="width:60px; font-size:16px;">
    <button onclick="submitConfidenceScore()">Submit Confidence Score</button>
  </div>

  <div class="section">
    <h2>Response</h2>
    <pre id="response">Response will appear here...</pre>
  </div>

  <script>
    const LOCAL = "http://localhost:8888/.netlify/functions/analyst-forrester";
    const PROD = "https://competitivebattlebot.netlify.app/.netlify/functions/analyst-forrester";
    const API = window.location.hostname === "localhost" ? LOCAL : PROD;
    const SESSION_ID = "test_forrester_002";

    document.getElementById('apiDisplay').textContent = API;

    async function callAPI(body) {
      document.getElementById('response').textContent = "Calling API...";
      try {
        const res = await fetch(API, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body)
        });
        const data = await res.json();
        document.getElementById('response').textContent =
          data.message || JSON.stringify(data, null, 2);
        return data;
      } catch(err) {
        document.getElementById('response').textContent = "Error: " + err.message;
      }
    }

    async function imageToBase64(inputId) {
      const file = document.getElementById(inputId).files[0];
      if (!file) { alert("Please select an image first"); return null; }
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => resolve(e.target.result.split(',')[1]);
        reader.readAsDataURL(file);
      });
    }

    async function startExtraction() {
      await callAPI({
        mode: "start_extraction",
        sessionId: SESSION_ID,
        waveName: "Email Marketing Service Providers",
        waveQuarter: "Q1",
        waveYear: "2026",
        vendorName: "Cordial",
        productName: "Cordial Edge GA"
      });
    }

    async function processScoreTable() {
      const base64 = await imageToBase64('scoreTable');
      if (!base64) return;
      await callAPI({
        mode: "process_score_table",
        sessionId: SESSION_ID,
        imageBase64: base64
      });
    }

    async function processWaveGraphic() {
      const base64 = await imageToBase64('waveGraphic');
      if (!base64) return;
      await callAPI({
        mode: "process_wave_graphic",
        sessionId: SESSION_ID,
        imageBase64: base64
      });
    }

    async function processVendorProfile() {
      const text = document.getElementById('profileText').value;
      if (!text.trim()) { alert("Please paste the vendor profile first"); return; }
      await callAPI({
        mode: "process_vendor_profile",
        sessionId: SESSION_ID,
        profileText: text
      });
    }

    async function submitPMMReview() {
      const response = document.getElementById('pmmResponse').value;
      if (!response.trim()) { alert("Please enter your PMM response first"); return; }
      await callAPI({
        mode: "submit_pmm_review",
        sessionId: SESSION_ID,
        pmmResponse: response
      });
      document.getElementById('pmmResponse').value = "";
    }

    async function submitConfidenceScore() {
      const score = document.getElementById('confidenceScore').value;
      await callAPI({
        mode: "submit_confidence_score",
        sessionId: SESSION_ID,
        confidenceScore: parseInt(score)
      });
    }
  </script>
</body>
</html>
